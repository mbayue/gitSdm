<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Graph-first repository analysis for exploring files, dependencies, modules, and architecture notes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=block" rel="stylesheet" />
  <title>gitSdmᵝ — Git Software Dependency Map</title>
  <style>
    html.fonts-loading body {
      opacity: 0 !important;
      visibility: hidden !important;
    }
    body {
      transition: opacity 0.15s ease-out;
    }
  </style>
  <script>
    (function () {
      try {
        // Theme synchronization
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
          document.documentElement.style.colorScheme = 'light';
        } else {
          document.documentElement.style.colorScheme = 'dark';
        }

        // Hide UI until critical fonts load
        if ('fonts' in document) {
          document.documentElement.classList.add('fonts-loading');
          
          var timeout = setTimeout(function () {
            document.documentElement.classList.remove('fonts-loading');
          }, 1000);

          Promise.all([
            document.fonts.load('1em "IBM Plex Sans"'),
            document.fonts.load('1em "JetBrains Mono"')
          ]).then(function () {
            clearTimeout(timeout);
            document.documentElement.classList.remove('fonts-loading');
          }).catch(function () {
            clearTimeout(timeout);
            document.documentElement.classList.remove('fonts-loading');
          });
        }
      } catch (e) {
        // fallback
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
